<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FuncJump</title>
  <style>
    :root {
      --bg: #0a1b3d;
      --panel: #0f2a5c;
      --blue: #4ea3ff;
      --blue-soft: #8cc9ff;
      --white: #ffffff;
      --error: #ff7b7b;
      --game-max-width: 960px;
      --game-max-height: 540px;
      --game-width: 960px;
      --game-height: 540px;
      --bar-height: 64px;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #frame {
      width: min(100vw, var(--game-width), var(--game-max-width));
      box-sizing: border-box;
      box-shadow: 0 0 40px rgba(78, 163, 255, 0.35);
      border: 1px solid rgba(140, 201, 255, 0.35);
      background: radial-gradient(circle at 20% 20%, rgba(78, 163, 255, 0.12), transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(140, 201, 255, 0.1), transparent 40%),
                  var(--bg);
    }
    #page-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, rgba(78, 163, 255, 0.12), transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(140, 201, 255, 0.1), transparent 40%),
                  var(--bg);
      color: var(--white);
      font-size: 18px;
      letter-spacing: 0.08em;
      z-index: 9999;
    }
    #page-loading.hidden {
      display: none;
    }
    #game {
      width: 100%;
      height: min(var(--game-height), var(--game-max-height));
      box-sizing: border-box;
    }
    #function-bar {
      width: 100%;
      height: var(--bar-height);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      box-sizing: border-box;
      background: rgba(15, 42, 92, 0.92);
      border-top: none;
      box-shadow: 0 14px 24px rgba(10, 27, 61, 0.35);
      visibility: hidden;
    }
    #function-bar.is-visible {
      visibility: visible;
    }
    .bar-label {
      font-size: 16px;
      color: var(--blue-soft);
      white-space: nowrap;
    }
    #function-input {
      flex: 1;
      min-width: 200px;
      height: 36px;
      background: rgba(10, 27, 61, 0.9);
      color: var(--white);
      border: 1px solid rgba(140, 201, 255, 0.4);
      border-radius: 6px;
      padding: 0 10px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 16px;
      outline: none;
    }
    #function-input::placeholder {
      color: rgba(140, 201, 255, 0.7);
    }
    .bar-button {
      height: 36px;
      padding: 0 12px;
      background: rgba(78, 163, 255, 0.2);
      border: 1px solid rgba(78, 163, 255, 0.6);
      color: var(--white);
      border-radius: 6px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .bar-button:hover {
      background: rgba(78, 163, 255, 0.35);
    }
    #function-error {
      font-size: 16px;
      color: var(--error);
      min-width: 160px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #function-error.is-visible {
      opacity: 1;
    }
    @media (max-width: 768px) {
      :root {
        --bar-height: 56px;
      }
      .bar-label {
        font-size: 12px;
      }
      #function-input {
        min-width: 120px;
        font-size: 14px;
      }
      .bar-button {
        font-size: 12px;
      }
      #function-error {
        font-size: 12px;
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div id="page-loading">Loading...</div>
  <div id="frame">
    <div id="game"></div>
    <div id="function-bar">
      <div class="bar-label">Function:</div>
      <input id="function-input" type="text" placeholder="input function (e.g. y = x^2)" />
      <button id="apply-function" class="bar-button">Apply</button>
      <div id="function-error"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="constants.js"></script>
  <script src="ui.js"></script>
  <script src="stages.js"></script>
  <script src="ClickStartScene.js"></script>
  <script src="TitleScene.js"></script>
  <script src="StageSelectScene.js"></script>
  <script src="CreditsScene.js"></script>
  <script src="RulesScene.js"></script>
  <script src="GameScene.js"></script>
  <script src="main.js"></script>
</body>
</html>
